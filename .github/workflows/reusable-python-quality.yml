name: Reusable Python Quality

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version used by the reusable quality workflow"
        required: true
        type: string
      run-pipeline:
        description: "Run the customer pipeline after lint and tests"
        required: false
        default: false
        type: boolean
    secrets:
      FAKE_API_TOKEN:
        required: false

jobs:
  python-quality:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install project dependencies
        run: make install PYTHON=python

      - name: Run lint with Ruff
        run: make lint PYTHON=python

      - name: Run test suite with Pytest
        run: make test PYTHON=python

      - name: Execute customer pipeline
        if: inputs.run-pipeline
        run: make run PYTHON=python

      - name: Validate fake API token reception
        env:
          FAKE_API_TOKEN: ${{ secrets.FAKE_API_TOKEN }}
        run: |
          if [ -n "$FAKE_API_TOKEN" ]; then
            echo "FAKE_API_TOKEN was received by the reusable workflow."
          else
            echo "FAKE_API_TOKEN was not provided to the reusable workflow."
          fi
