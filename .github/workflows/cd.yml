name: CD

on:
  push:
    branches: [main]

# This CD simulates a controlled publication of validated data artifacts.
jobs:
  validate-project:
    name: Validate project
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: make install PYTHON=python

      - name: Run lint
        run: make lint PYTHON=python

      - name: Run tests
        run: make test PYTHON=python

  publish-data-artifacts:
    name: Publish data artifacts
    runs-on: ubuntu-latest
    needs: validate-project

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: make install PYTHON=python

      - name: Execute customer pipeline
        run: make run PYTHON=python

      - name: Upload processed customers file
        uses: actions/upload-artifact@v4
        with:
          name: customers-processed-data
          path: data/processed/customers_processed.csv
          if-no-files-found: error

      - name: Upload pipeline summary report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary-report
          path: reports/pipeline_summary.md
          if-no-files-found: error

      - name: Write workflow summary
        run: |
          {
            echo "## CD summary"
            echo
            echo "Validated the project on \`main\` and published the generated data artifacts."
            echo
            echo "- Artifact: \`customers-processed-data\`"
            echo "- File: \`data/processed/customers_processed.csv\`"
            echo "- Artifact: \`pipeline-summary-report\`"
            echo "- File: \`reports/pipeline_summary.md\`"
            echo
            echo "This workflow represents a controlled data artifact publication step, not a cloud deployment."
          } >> "$GITHUB_STEP_SUMMARY"
