name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-project:
    name: Validate project
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: make install PYTHON=python

      - name: Run lint with Ruff
        run: make lint PYTHON=python

      - name: Run test suite with Pytest
        run: make test PYTHON=python

      - name: Execute customer pipeline
        run: make run PYTHON=python

      - name: Upload pipeline summary report
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary
          path: reports/pipeline_summary.md
          if-no-files-found: error
