name: Contexts, Vars and Secrets

on:
  workflow_dispatch:

env:
  WORKFLOW_LABEL: context-vars-secrets-demo
  PROJECT_ENVIRONMENT: ${{ vars.PROJECT_ENV || 'not_configured' }}

jobs:
  inspect-configuration:
    name: Inspect configuration and secret availability
    runs-on: ubuntu-latest
    env:
      JOB_LABEL: workflow-dispatch-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect non-sensitive execution context
        run: |
          echo "Workflow label: $WORKFLOW_LABEL"
          echo "Job label: $JOB_LABEL"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Project environment: $PROJECT_ENVIRONMENT"

      - name: Validate fake API token presence
        id: secret-check
        env:
          FAKE_API_TOKEN: ${{ secrets.FAKE_API_TOKEN }}
        run: |
          if [ -n "$FAKE_API_TOKEN" ]; then
            echo "secret_found=yes" >> "$GITHUB_OUTPUT"
          else
            echo "secret_found=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Write workflow summary
        run: |
          {
            echo "## Context, vars and secrets summary"
            echo
            echo "- Branch executada: \`${{ github.ref_name }}\`"
            echo "- Actor: \`${{ github.actor }}\`"
            echo "- Sistema operacional do runner: \`${{ runner.os }}\`"
            echo "- Ambiente do projeto: \`${{ env.PROJECT_ENVIRONMENT }}\`"
            echo "- Secret FAKE_API_TOKEN encontrado: \`${{ steps.secret-check.outputs.secret_found }}\`"
            echo
            echo "Este workflow demonstra o uso de env, vars, secrets e contexts sem expor valores sensíveis."
          } >> "$GITHUB_STEP_SUMMARY"
